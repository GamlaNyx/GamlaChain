<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GamlaChain Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/neumorphism.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --node-0: #5a8a6e; --node-1: #8a9b6e; --node-2: #6e8a7a; --node-3: #a0b090; --node-4: #7a9682;
  }
  .explorer-body { font-family: var(--font-body); background: var(--bg); color: var(--text-primary); min-height: 100vh; }
  .explorer-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: var(--bg); box-shadow: var(--shadow-raised-sm); position: sticky; top: 0; z-index: 50; flex-wrap: wrap; gap: 8px; }
  .explorer-nav .brand { font-family: var(--font-title); font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }

  .explorer-stat { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 12px 18px; }
  .explorer-stat .stat-card { padding: 12px 14px; }
  .explorer-stat .stat-card .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-muted); margin-bottom: 2px; font-weight: 500; }
  .explorer-stat .stat-card .value { font-family: var(--font-title); font-size: 1.15rem; font-weight: 700; }
  .explorer-stat .stat-card .delta { font-size: 10px; margin-left: 4px; }

  .explorer-grid { display: grid; grid-template-columns: 300px 1fr 300px; gap: 12px; padding: 0 18px 12px; }
  .exp-panel { background: var(--bg); border-radius: var(--radius-lg); box-shadow: var(--shadow-raised); padding: 14px; }
  .exp-panel h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

  .exp-input { width: 100%; padding: 7px 10px; font-family: var(--font-mono); font-size: 11px; color: var(--text-primary); background: var(--bg); border: none; border-radius: var(--radius-md); box-shadow: var(--shadow-inset); outline: none; }
  .exp-input:focus { box-shadow: var(--shadow-inset), 0 0 0 2px rgba(90,138,110,0.2); }

  .exp-btn { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-body); font-weight: 600; font-size: 11px; padding: 6px 12px; border: none; border-radius: var(--radius-md); cursor: pointer; transition: all 0.25s ease; white-space: nowrap; }
  .exp-btn-primary { background: var(--accent); color: #fff; box-shadow: 3px 3px 6px rgba(90,138,110,0.25); }
  .exp-btn-primary:hover { background: var(--accent-hover); box-shadow: 5px 5px 10px rgba(90,138,110,0.35); }
  .exp-btn-outline { background: var(--bg); color: var(--text-secondary); box-shadow: var(--shadow-raised-sm); }
  .exp-btn-outline:hover { box-shadow: var(--shadow-raised); color: var(--text-primary); }
  .exp-btn-outline.active { color: var(--accent); box-shadow: var(--shadow-inset); background: var(--bg); }
  .exp-btn:active { box-shadow: var(--shadow-inset) !important; transform: scale(0.97); }
  .exp-btn-tog { border: none; padding: 5px 10px; font-size: 10px; }
  .exp-btn-tog.on { background: var(--accent); color: #fff; box-shadow: none; }

  .exp-list { max-height: 450px; overflow-y: auto; }
  .exp-list-sm { max-height: 160px; overflow-y: auto; }
  .exp-block-item { padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; margin-bottom: 3px; font-size: 11px; border: 1px solid var(--border-light); }
  .exp-block-item:hover { box-shadow: var(--shadow-raised-sm); background: var(--bg-light); }
  .exp-tx-item { padding: 6px 10px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; margin-bottom: 2px; font-size: 10px; border: 1px solid var(--border-light); }
  .exp-tx-item:hover { box-shadow: var(--shadow-raised-sm); background: var(--bg-light); }
  @keyframes newGlow { 0%{box-shadow:0 0 12px rgba(90,138,110,0.4);background:rgba(90,138,110,0.1)} 100%{box-shadow:none;background:transparent} }
  .exp-block-item.new-block { animation: newGlow 2s ease-out; }

  .chart-wrap { position:relative; width:100%; height:160px; }
  .chart-wrap canvas { width:100% !important; height:100% !important; }
  .charts-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 18px 12px; }

  .block-viz { display:flex; align-items:center; gap:3px; overflow-x:auto; padding:4px 0; }
  .block-viz-item { flex-shrink:0; text-align:center; cursor:pointer; padding:5px 8px; border-radius:8px; background:var(--bg); box-shadow:var(--shadow-raised-sm); min-width:60px; font-size:10px; transition:all 0.25s; }
  .block-viz-item:hover { box-shadow:var(--shadow-raised); background:var(--bg-light); }

  .modal-overlay { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.35); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; }
  .modal-content { background:var(--bg); border-radius:var(--radius-lg); box-shadow:var(--shadow-raised-lg); padding:24px; max-width:560px; width:90%; max-height:80vh; overflow-y:auto; }
  .detail-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border-light); }
  .detail-label { color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:0.4px; }
  .detail-value { color:var(--text-primary); font-family:var(--font-mono); font-size:12px; word-break:break-all; text-align:right; max-width:58%; }

  .toast-ctr { position:fixed; top:56px; right:16px; z-index:200; display:flex; flex-direction:column; gap:6px; }
  .exp-toast { padding:10px 16px; border-radius:var(--radius-md); box-shadow:var(--shadow-raised-lg); font-size:12px; background:var(--bg-light); animation:fadeIn 0.35s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

  .multi-grid { display:grid; gap:12px; padding:0 18px 12px; }
  .multi-grid.cols-2 { grid-template-columns:1fr 1fr; }
  .multi-grid.cols-3 { grid-template-columns:1fr 1fr 1fr; }
  .multi-grid.cols-4 { grid-template-columns:1fr 1fr 1fr 1fr; }
  .multi-grid.cols-many { grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); }

  @media(max-width:1100px){.explorer-grid{grid-template-columns:1fr 1fr}.charts-row{grid-template-columns:1fr 1fr}}
  @media(max-width:768px){.explorer-grid{grid-template-columns:1fr}.explorer-stat{grid-template-columns:repeat(3,1fr)}.charts-row{grid-template-columns:1fr}}
  @media(max-width:480px){.explorer-stat{grid-template-columns:repeat(2,1fr)}}

  .sim-bar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-left:auto; }
  .sim-status { font-size:10px; color:var(--text-muted); }
</style>
</head>
<body class="explorer-body">

<div class="toast-ctr" id="toastContainer"></div>

<!-- NAVBAR -->
<nav class="explorer-nav">
  <div class="brand"><i class="fa-solid fa-cubes" style="color:var(--accent);"></i> GamlaChain Explorer</div>

  <div style="display:flex;align-items:center;gap:6px;background:var(--bg);border-radius:var(--radius-md);padding:2px;box-shadow:var(--shadow-inset-sm);">
    <button class="exp-btn exp-btn-outline active exp-btn-tog" id="btnSingle" onclick="setMode('single')">单节点</button>
    <button class="exp-btn exp-btn-outline exp-btn-tog" id="btnMulti" onclick="setMode('multi')">多节点</button>
  </div>

  <span id="nodeStatusBar" class="hidden" style="display:flex;align-items:center;gap:4px;"></span>

  <div class="sim-bar">
    <button class="exp-btn exp-btn-outline" id="btnAutoBlock" onclick="toggleAutoBlock()">
      <i class="fa-solid fa-cube"></i> <span id="btnAutoBlockLabel">自动出块</span>
    </button>
    <button class="exp-btn exp-btn-outline" id="btnSimTx" onclick="toggleSimTx()">
      <i class="fa-solid fa-paper-plane"></i> <span id="btnSimTxLabel">模拟交易</span>
    </button>
    <span id="simStatus" class="hidden sim-status"></span>
    <span class="sim-status" id="clockDisplay">--</span>
  </div>
</nav>

<!-- SINGLE NODE VIEW -->
<div id="viewSingle">
  <div class="explorer-stat" id="statsRow">
    <div class="stat-card"><div class="label">区块高度</div><div class="value" style="color:var(--accent);" id="sHeight">--</div></div>
    <div class="stat-card"><div class="label">总交易数</div><div class="value" style="color:var(--accent-hover);" id="sTxCount">--</div></div>
    <div class="stat-card"><div class="label">挖矿难度</div><div class="value" style="color:var(--text-secondary);" id="sDifficulty">--</div></div>
    <div class="stat-card"><div class="label">待打包</div><div class="value" style="color:var(--warning);" id="sPending">--</div></div>
    <div class="stat-card"><div class="label">流通总量</div><div class="value" style="color:var(--success);" id="sSupplyStat">--</div></div>
  </div>

  <div class="explorer-grid">
    <!-- BLOCKS -->
    <div class="exp-panel" style="min-height:480px;">
      <div class="flex-between" style="margin-bottom:8px;">
        <h3><i class="fa-solid fa-cube" style="color:var(--accent);"></i> 区块</h3>
        <button class="exp-btn exp-btn-primary" onclick="mineOnNode(0)"><i class="fa-solid fa-hammer"></i> 挖矿</button>
      </div>
      <div class="flex gap-2 mb-2">
        <input class="exp-input" type="text" id="searchInput" placeholder="#高度 或 地址..." onkeydown="if(event.key==='Enter')doSearch()" style="flex:1;">
        <button class="exp-btn exp-btn-outline" onclick="doSearch()" style="font-size:10px;padding:5px 8px;"><i class="fa-solid fa-search"></i></button>
      </div>
      <span style="font-size:9px;color:var(--text-muted);" id="searchResult"></span>
      <div class="exp-list" id="blockList0"></div>
    </div>

    <!-- CENTER: TX + PENDING + VIZ -->
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div class="exp-panel">
        <div class="flex-between" style="margin-bottom:8px;"><h3><i class="fa-solid fa-paper-plane" style="color:var(--warning);"></i> 新交易</h3><button class="exp-btn exp-btn-outline" onclick="quickFillTx()" style="font-size:9px;padding:3px 7px;"><i class="fa-solid fa-shuffle"></i> 随机</button></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;">
          <input class="exp-input" type="text" id="txSender" placeholder="发送方" style="font-size:10px;">
          <input class="exp-input" type="text" id="txReceiver" placeholder="接收方" style="font-size:10px;">
        </div>
        <div class="flex gap-2">
          <input class="exp-input" type="number" id="txAmount" placeholder="金额" step="0.0001" style="flex:2;font-size:10px;">
          <button class="exp-btn exp-btn-primary" onclick="sendTx(0)" style="flex:1;font-size:10px;padding:6px;"><i class="fa-solid fa-rocket"></i> 发送</button>
        </div>
      </div>
      <div class="exp-panel" style="flex:1;">
        <div class="flex-between" style="margin-bottom:8px;"><h3><i class="fa-solid fa-clock" style="color:var(--warning);"></i> 待打包</h3><span class="badge badge-warning" id="pendingBadge0">0</span></div>
        <div class="exp-list-sm" id="pendingList0"></div>
      </div>
      <div class="exp-panel">
        <h3><i class="fa-solid fa-link" style="color:var(--accent);"></i> 可视化</h3>
        <div class="block-viz" id="blockChainViz"><div style="color:var(--text-muted);text-align:center;width:100%;font-size:10px;">加载中...</div></div>
      </div>
    </div>

    <!-- ADDRESS + CHARTS -->
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div class="exp-panel">
        <h3><i class="fa-solid fa-wallet" style="color:var(--accent);"></i> 地址查询</h3>
        <div class="flex gap-2 mb-2">
          <input class="exp-input" type="text" id="addrInput" placeholder="0x地址..." style="font-size:10px;flex:1;" onkeydown="if(event.key==='Enter')lookupAddress()">
          <button class="exp-btn exp-btn-primary" onclick="lookupAddress()" style="font-size:10px;padding:5px 10px;">查询</button>
        </div>
        <div class="flex-between"><span style="font-size:10px;color:var(--text-muted);">余额</span><span style="font-family:var(--font-title);font-weight:700;color:var(--success);" id="addrBalance">--</span></div>
        <div style="font-size:10px;color:var(--text-muted);margin:6px 0 4px;">交易记录 <span id="addrTxCount"></span></div>
        <div class="exp-list-sm" id="addrHistory"><div style="color:var(--text-muted);text-align:center;padding:12px;font-size:10px;">输入地址并查询</div></div>
      </div>
      <div class="exp-panel"><h3><i class="fa-solid fa-chart-line" style="color:var(--accent);"></i> 出块时间 (秒)</h3><div class="chart-wrap"><canvas id="chartBlockTime"></canvas></div></div>
      <div class="exp-panel"><h3><i class="fa-solid fa-chart-bar" style="color:var(--accent-hover);"></i> 每块交易数</h3><div class="chart-wrap"><canvas id="chartTxCount"></canvas></div></div>
    </div>
  </div>

  <div class="charts-row">
    <div class="exp-panel"><h3><i class="fa-solid fa-weight-hanging" style="color:var(--text-secondary);"></i> 区块大小 (KB)</h3><div class="chart-wrap"><canvas id="chartBlockSize"></canvas></div></div>
    <div class="exp-panel"><h3><i class="fa-solid fa-chart-pie" style="color:var(--warning);"></i> 交易池</h3><div class="chart-wrap"><canvas id="chartTxPie"></canvas></div></div>
    <div class="exp-panel"><h3><i class="fa-solid fa-check-circle" style="color:var(--success);"></i> 链有效性</h3><div class="chart-wrap"><canvas id="chartValid"></canvas></div></div>
  </div>

  <div style="padding:0 18px 10px;display:flex;gap:16px;flex-wrap:wrap;font-size:10px;color:var(--text-muted);">
    <span>链: <b style="color:var(--text-primary);">gamla-8848</b></span>
    <span>共识: <b style="color:var(--text-primary);">PoW</b></span>
    <span>节点: <b style="font-family:var(--font-mono);color:var(--text-primary);" id="sNodeId">--</b></span>
    <span>奖励: <b style="color:var(--success);" id="sReward">--</b></span>
    <span>平均出块: <b style="color:var(--text-primary);" id="sAvgTime">--</b></span>
    <span>对等: <b style="color:var(--text-primary);" id="sPeerList">--</b></span>
  </div>
</div>

<!-- MULTI NODE VIEW -->
<div id="viewMulti" class="hidden">
  <div style="padding:12px 18px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;">
    <span style="font-family:var(--font-title);font-weight:600;font-size:13px;color:var(--accent);"><i class="fa-solid fa-network-wired"></i> 节点</span>
    <span id="nodeDotsBar" style="display:flex;gap:4px;"></span>
    <div class="flex gap-2" id="nodeUrlTags" style="flex:1;"></div>
    <input class="exp-input" type="text" id="newNodeUrl" placeholder="http://127.0.0.1:8002" style="width:180px;font-size:10px;">
    <button class="exp-btn exp-btn-primary" onclick="addNode()"><i class="fa-solid fa-plus"></i> Add</button>
  </div>
  <div style="padding:6px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <button class="exp-btn exp-btn-outline" onclick="registerAllNodes()"><i class="fa-solid fa-link"></i> 全部注册</button>
    <span style="font-size:10px;color:var(--text-muted);">共识目标:</span>
    <select id="resolveTarget" class="exp-input" style="width:auto;font-size:10px;padding:5px 8px;"></select>
    <button class="exp-btn exp-btn-primary" onclick="resolveOnSelected()"><i class="fa-solid fa-scale-balanced"></i> 执行共识</button>
    <span style="font-size:10px;color:var(--text-muted);" id="consensusStatus">--</span>
  </div>
  <div style="padding:8px 18px;">
    <div class="exp-panel">
      <h3><i class="fa-solid fa-link" style="color:var(--accent);"></i> 可视化</h3>
      <div id="multiBlockChainViz"><div style="color:var(--text-muted);text-align:center;font-size:10px;">加载中...</div></div>
    </div>
  </div>
  <div style="padding:0 18px 8px;overflow-x:auto;">
    <table style="width:100%;font-size:11px;border-collapse:collapse;" id="statsTable"></table>
  </div>
  <div class="multi-grid cols-2" id="nodeCards"></div>
  <div style="padding:0 18px 12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;" id="multiCharts"></div>
</div>

<!-- MODALS -->
<div id="modalOverlay" class="modal-overlay" style="display:none;" onclick="closeModal(event)">
  <div class="modal-content" id="modalContent" onclick="event.stopPropagation()"></div>
</div>

<script>
// ============ CONFIG ============
const NODE_COLORS = ['#5a8a6e','#8a9b6e','#6e8a7a','#a0b090','#7a9682'];
function nodeColor(i) { return NODE_COLORS[i%NODE_COLORS.length]; }
const SIM_ADDRESSES = ['0xalice_wallet_001','0xbob_wallet_002','0xcharlie_wallet_003','0xdave_wallet_004','0xeve_wallet_005'];
const FETCH_TIMEOUT = 5000;

function normalizeUrl(u) { return u.replace(/\/+$/,''); }
function loadNodes() {
  try { return JSON.parse(localStorage.getItem('gamla_nodes')||'["http://127.0.0.1:8000","http://127.0.0.1:8001"]').map(normalizeUrl); }
  catch { return ['http://127.0.0.1:8000','http://127.0.0.1:8001']; }
}
function saveNodes(urls) { localStorage.setItem('gamla_nodes', JSON.stringify(urls)); }

let nodeUrls = loadNodes();
let mode = localStorage.getItem('gamla_explorer_mode')||'single';
let nodesData = [];
let lastHeight = 0, lastBlockIdx = 0;

// ============ HELPERS ============
function shortHash(h) { if(!h) return '--'; return h.slice(0,8)+'...'+h.slice(-6); }
function timeAgo(ts) { if(!ts) return '--'; const s = Date.now()/1000 - ts; if(s<60) return Math.round(s)+'s'; if(s<3600) return Math.round(s/60)+'m'; return Math.round(s/3600)+'h'; }
function fmt(n, d) { if(n==null) return '--'; return Number(n).toLocaleString(undefined, d!=null?{minimumFractionDigits:d,maximumFractionDigits:d}:undefined); }
function esc(json) { return JSON.stringify(json).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ============ API ============
async function fetchWithTimeout(url, opts={}) {
  const ctrl = new AbortController(); const timer = setTimeout(()=>ctrl.abort(), FETCH_TIMEOUT);
  try { const r=await fetch(url,{...opts,signal:ctrl.signal}); clearTimeout(timer); return r; }
  catch(e){ clearTimeout(timer); throw e; }
}
async function apiGet(base, path) {
  try { const r=await fetchWithTimeout(normalizeUrl(base)+path); if(!r.ok) return null; const j=await r.json(); return j.ok!==false?j:null; }
  catch { return null; }
}
async function apiPost(base, path, body) {
  try { const r=await fetchWithTimeout(normalizeUrl(base)+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); if(!r.ok) return null; const j=await r.json(); return j.ok!==false?j:null; }
  catch { return null; }
}
async function fetchNodeData(base) {
  const [chainRes, pendingRes, validRes] = await Promise.all([
    apiGet(base,'/api/v1/chain'), apiGet(base,'/api/v1/transactions/pending'), apiGet(base,'/api/v1/validate')
  ]);
  return {
    online: !!chainRes, chain: chainRes?.data?.chain||[], length: chainRes?.data?.length||0,
    difficulty: chainRes?.data?.difficulty||0, reward: chainRes?.data?.mining_reward||0,
    nodes: chainRes?.data?.nodes||[], node_id: chainRes?.data?.node_identifier||'--',
    pending: pendingRes?.data||[], pending_count: pendingRes?.count??(pendingRes?.data?.length||0),
    valid: validRes?.valid??null
  };
}

// ============ MODE ============
function setMode(newMode) {
  mode = newMode; localStorage.setItem('gamla_explorer_mode', mode);
  document.getElementById('btnSingle').classList.toggle('active', mode==='single');
  document.getElementById('btnMulti').classList.toggle('active', mode==='multi');
  document.getElementById('viewSingle').classList.toggle('hidden', mode!=='single');
  document.getElementById('viewMulti').classList.toggle('hidden', mode!=='multi');
  document.getElementById('nodeStatusBar').classList.toggle('hidden', mode!=='multi');
  if(mode==='multi') renderNodeManager();
  poll();
}

// ============ NODE MANAGEMENT ============
function addNode() {
  const input = document.getElementById('newNodeUrl'); const url = normalizeUrl(input.value.trim());
  if(!url.startsWith('http://')&&!url.startsWith('https://')) { toast('URL 必须以 http:// 或 https:// 开头','error'); return; }
  if(nodeUrls.includes(url)) { toast('节点已存在','error'); return; }
  nodeUrls.push(url); saveNodes(nodeUrls); input.value = ''; renderNodeManager(); poll();
}
function removeNode(i) {
  if(nodeUrls.length<=1) { toast('至少保留 1 个节点','error'); return; }
  nodeUrls.splice(i,1); saveNodes(nodeUrls); nodesData.splice(i,1); renderNodeManager(); poll();
}
function renderNodeManager() {
  document.getElementById('nodeDotsBar').innerHTML = nodeUrls.map((_,i)=>`<span class="pulse-dot" id="multiDot${i}" style="width:6px;height:6px;background:${nodeColor(i)};border-radius:50%;"></span>`).join('');
  document.getElementById('nodeUrlTags').innerHTML = nodeUrls.map((url,i)=>`<span class="badge badge-success" style="font-size:9px;">${url.replace('http://','')} <i class="fa-solid fa-xmark ml-1 cursor-pointer" onclick="removeNode(${i})" style="font-size:8px;opacity:0.6;"></i></span>`).join('');
  document.getElementById('resolveTarget').innerHTML = nodeUrls.map((url,i)=>`<option value="${i}">Node ${i}: ${url}</option>`).join('');
}

// ============ POLL ============
async function poll() {
  document.getElementById('clockDisplay').textContent = new Date().toLocaleTimeString();
  if(mode==='single') { nodesData = [await fetchNodeData(nodeUrls[0])]; updateSingleView(); }
  else {
    const settled = await Promise.allSettled(nodeUrls.map(u=>fetchNodeData(u)));
    nodesData = settled.map(s=>s.status==='fulfilled'?s.value:{online:false,chain:[],length:0,difficulty:0,reward:0,nodes:[],node_id:'',pending:[],pending_count:0,valid:null,_error:s.status==='rejected'?s.reason:null});
    nodeUrls.forEach((_,i)=>{const dot=document.getElementById('multiDot'+i); if(dot) dot.style.opacity = nodesData[i]?.online?'1':'0.3';});
    updateMultiView();
  }
}

// ============ SINGLE VIEW ============
function updateSingleView() {
  const d = nodesData[0];
  if(!d||!d.online) {
    ['sHeight','sTxCount','sDifficulty','sPending','sSupplyStat'].forEach(id=>document.getElementById(id).textContent='离线');
    document.getElementById('blockList0').innerHTML='<div style="color:var(--text-muted);text-align:center;padding:30px;">API 离线</div>';
    document.getElementById('pendingList0').innerHTML='<div style="color:var(--text-muted);text-align:center;padding:20px;">--</div>';
    return;
  }
  let totalTx=0; d.chain.forEach(b=>totalTx+=b.transactions?.length||0);
  document.getElementById('sHeight').textContent = fmt(d.length);
  if(lastHeight>0 && d.length>lastHeight) { document.getElementById('sHeight').innerHTML += '<span class="delta" style="color:var(--success);">+'+ (d.length-lastHeight)+'</span>'; }
  lastHeight = d.length;
  document.getElementById('sTxCount').textContent = fmt(totalTx);
  document.getElementById('sDifficulty').textContent = d.difficulty;
  document.getElementById('sPending').textContent = fmt(d.pending_count);
  document.getElementById('sNodeId').textContent = shortHash(d.node_id);
  document.getElementById('sReward').textContent = fmt(d.reward,1)+' GLC';
  document.getElementById('sPeerList').textContent = d.nodes?.length ? d.nodes.join(', ') : 'none';
  let supply=0; d.chain.forEach(b=>{b.transactions?.forEach(tx=>{if(tx.sender==='network'||tx.sender==='faucet') supply+=tx.amount;});});
  document.getElementById('sSupplyStat').textContent = fmt(supply,0)+' GLC';
  if(d.chain.length>=2) { let t=0; for(let i=1;i<d.chain.length;i++) t+=Math.max(0,(d.chain[i].timestamp-d.chain[i-1].timestamp)); document.getElementById('sAvgTime').textContent = (t/(d.chain.length-1)).toFixed(1)+'s'; }
  renderBlockList('blockList0', d);
  renderBlockChainViz("blockChainViz", d);
  renderPendingList('pendingList0', d, 'pendingBadge0');
  updateSingleCharts(d);
}

function renderBlockList(elId, d) {
  const el = document.getElementById(elId); if(!el) return;
  if(!d.chain.length) { el.innerHTML='<div style="color:var(--text-muted);text-align:center;padding:20px;">暂无区块</div>'; return; }
  const newThreshold = lastBlockIdx; lastBlockIdx = (d.chain[d.chain.length-1]||{}).index||0;
  el.innerHTML = [...d.chain].reverse().map(b=>`<div class="exp-block-item${b.index>newThreshold?' new-block':''}" onclick="showBlockDetail(${esc(b)})">
    <div class="flex-between"><span style="font-family:var(--font-title);font-weight:700;color:var(--accent);">#${b.index}</span><span style="font-size:9px;color:var(--text-muted);">${timeAgo(b.timestamp)}</span></div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">${shortHash(b.hash)}</div>

}
function renderBlockChainViz(elId, d) {
  const el = document.getElementById(elId); if(!el) return;

function renderPendingList(elId, d, badgeId) {

// ============ CHARTS ============
let sCharts = {};
function sChart(canvasId, type, labels, data, borderColor, bgColor) {
  const ctx = document.getElementById(canvasId)?.getContext('2d'); if(!ctx) return;
  if(sCharts[canvasId]) sCharts[canvasId].destroy();
  const g = ctx.createLinearGradient(0,0,0,160); g.addColorStop(0,bgColor[0]); g.addColorStop(1,bgColor[1]);
  sCharts[canvasId] = new Chart(ctx, {
    type, data:{labels,datasets:[{data,borderColor,backgroundColor:g,borderWidth:2,fill:type==='line',tension:0.4,pointRadius:0,pointHoverRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},plugins:{legend:{display:false}},
      scales:{x:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'rgba(0,0,0,0.4)',font:{size:9},maxTicksLimit:6}},
              y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'rgba(0,0,0,0.4)',font:{size:9},maxTicksLimit:4}}}}
  });
}
function sDoughnut(canvasId, labels, data, colors) {
  const ctx = document.getElementById(canvasId)?.getContext('2d'); if(!ctx) return;
  if(sCharts[canvasId]) sCharts[canvasId].destroy();
  sCharts[canvasId] = new Chart(ctx, {
    type:'doughnut', data:{labels,datasets:[{data,backgroundColor:colors,borderColor:getComputedStyle(document.documentElement).getPropertyValue('--bg'),borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'bottom',labels:{color:'var(--text-secondary)',font:{size:9},padding:8,usePointStyle:true}}}}
  });
}
function updateSingleCharts(d) {
  if(!d||!d.online||!d.chain||d.chain.length<2) return;
  const b = d.chain.slice(-15), lbls = b.map(x=>'#'+x.index);
  const times=[]; for(let i=1;i<b.length;i++) times.push(Math.max(0,(b[i].timestamp-b[i-1].timestamp)||0));
  sChart('chartBlockTime','line',lbls.slice(1),times,'#5a8a6e',['rgba(90,138,110,0.25)','rgba(90,138,110,0)']);
  sChart('chartTxCount','line',lbls,b.map(x=>x.transactions?.length||0),'#c9a96e',['rgba(201,169,110,0.2)','rgba(201,169,110,0)']);
  sChart('chartBlockSize','bar',lbls,b.map(x=>(x.transactions?.length||0)*0.5+1),'rgba(90,138,110,0.5)',['rgba(90,138,110,0.5)','rgba(90,138,110,0.1)']);
  sDoughnut('chartTxPie',['Pending','Mined'],[d.pending_count||0,d.chain.reduce((s,x)=>s+(x.transactions?.length||0),0)],['rgba(201,169,110,0.7)','rgba(90,138,110,0.5)']);
  sDoughnut('chartValid',['Valid','Invalid'],[d.valid?1:0,d.valid?0:1],['rgba(90,138,110,0.7)','rgba(201,112,112,0.4)']);
}

// ============ SEARCH & ADDRESS ============
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim(); const el = document.getElementById('searchResult');
  if(!q) { el.textContent=''; return; }
  if(/^#?\d+$/.test(q)) {
    const n = parseInt(q.replace('#','')); const block = nodesData[0]?.chain?.find(b=>b.index===n);
    if(block) { showBlockDetail(block); el.textContent=''; }
    else { const res=await apiGet(nodeUrls[0],'/api/v1/blocks/'+n); if(res?.data) showBlockDetail(res.data); else { el.textContent='Block #'+n+' 未找到'; el.style.color='var(--danger)'; } }
    return;
  }
  if(/^0x[a-fA-F0-9]{8,}/.test(q)||q.length>=16) { document.getElementById('addrInput').value=q; await lookupAddress(); el.textContent=''; return; }
}
function quickFillTx() {
  const a=SIM_ADDRESSES[Math.floor(Math.random()*SIM_ADDRESSES.length)]; let b=SIM_ADDRESSES[Math.floor(Math.random()*SIM_ADDRESSES.length)];
  while(b===a) b=SIM_ADDRESSES[Math.floor(Math.random()*SIM_ADDRESSES.length)];
  document.getElementById('txSender').value=a; document.getElementById('txReceiver').value=b; document.getElementById('txAmount').value=(Math.random()*49.9+0.1).toFixed(4);
}
async function lookupAddress() {
  const addr = document.getElementById('addrInput').value.trim(); if(!addr) return;
  const [balRes, histRes] = await Promise.all([apiGet(nodeUrls[0],'/api/v1/balance/'+encodeURIComponent(addr)), apiGet(nodeUrls[0],'/api/v1/history/'+encodeURIComponent(addr))]);
  document.getElementById('addrBalance').textContent = balRes ? fmt(balRes.balance,4)+' GLC' : '--';
  const el = document.getElementById('addrHistory');
  if(!histRes||!histRes.transactions||histRes.transactions.length===0) { el.innerHTML='<div style="color:var(--text-muted);text-align:center;padding:12px;font-size:10px;">暂无交易记录</div>'; return; }
  el.innerHTML = histRes.transactions.reverse().map(tx=>{
    const isIn = tx.receiver === addr;
    return `<div class="exp-tx-item" onclick="showTxDetail(${esc(tx)})"><div class="flex-between"><span style="font-family:var(--font-mono);font-size:9px;color:${isIn?'var(--success)':'var(--danger)'};">${isIn?'↓ IN':'↑ OUT'}</span><span style="font-size:9px;color:var(--text-muted);">${timeAgo(tx.timestamp)}</span></div><div class="flex-between" style="font-size:9px;"><span style="color:var(--text-secondary);">${isIn?shortHash(tx.sender):shortHash(tx.receiver)}</span><span style="color:${isIn?'var(--success)':'var(--danger)'};">${isIn?'+':'-'}${fmt(tx.amount,4)} GLC</span></div></div>`;
  }).join('');
  document.getElementById('addrTxCount').textContent = '('+histRes.count+' tx)';
}

// ============ ACTIONS ============
function getNodeUrl(idx) { return nodeUrls[idx]||nodeUrls[0]; }
async function mineOnNode(idx) {
  const url = getNodeUrl(idx); toast('正在节点 '+idx+' 挖矿...','info');
  const res = await apiPost(url,'/api/v1/mine?miner_address=explorer');
  if(res) toast('Block #'+res.data?.index+' 已出块!','success'); else toast('挖矿失败','error');
  poll();
}
async function sendTx(idx) {
  const url = getNodeUrl(idx);
  const sender = document.getElementById('txSender').value.trim();
  const receiver = document.getElementById('txReceiver').value.trim();
  const amount = parseFloat(document.getElementById('txAmount').value);
  if(!sender||!receiver||isNaN(amount)||amount<=0) { toast('请填写完整信息','error'); return; }
  const res = await apiPost(url,'/api/v1/transactions',{sender,receiver,amount,timestamp:Date.now()/1000,tx_hash:''});
  if(res) { toast('交易已发送','success'); document.getElementById('txSender').value=''; document.getElementById('txReceiver').value=''; document.getElementById('txAmount').value=''; }
  else toast('交易失败','error');
  poll();
}
async function registerAllNodes() {
  toast('注册网状网络中...','info'); let ok=0;
  for(let i=0;i<nodeUrls.length;i++) { const others=nodeUrls.filter((_,j)=>j!==i); const res=await apiPost(nodeUrls[i],'/api/v1/nodes/register',{nodes:others}); if(res) ok++; }
  toast(ok+'/'+nodeUrls.length+' 个节点已注册','success'); poll();
}
async function resolveOnSelected() {
  const idx = parseInt(document.getElementById('resolveTarget').value); const url = getNodeUrl(idx);
  toast('正在节点 '+idx+' 执行共识...','info');
  const res = await apiGet(url,'/api/v1/nodes/resolve');
  if(res) toast(res.message, res.message?.includes('replaced')?'info':'success'); else toast('共识失败','error');
  poll();
}

// ============ SIMULATION ============
let autoBlockRunning = false, simTxRunning = false;
let autoBlockTimer = null, simTxTimer = null;
let simTxCount = 0, autoBlockCount = 0;
let simStartTime = 0;

function toggleAutoBlock() {
  if(autoBlockRunning) { stopAutoBlock(); return; }
  autoBlockRunning = true; autoBlockCount = 0; simStartTime = Date.now();
  document.getElementById('btnAutoBlock').classList.add('active');
  document.getElementById('btnAutoBlockLabel').textContent = '停止出块';
  document.getElementById('simStatus').classList.remove('hidden');
  toast('⛏ 自动出块已启动 — 每 2.5 秒生成一个区块','info');
  scheduleAutoBlock();
}

function stopAutoBlock() {
  autoBlockRunning = false; if(autoBlockTimer) clearTimeout(autoBlockTimer); autoBlockTimer = null;
  document.getElementById('btnAutoBlock').classList.remove('active');
  document.getElementById('btnAutoBlockLabel').textContent = '自动出块';
  updateSimStatus();
}

function scheduleAutoBlock() {
  if(!autoBlockRunning) return;
  autoBlockTimer = setTimeout(async ()=>{
    if(!autoBlockRunning) return;
    const minerAddr = SIM_ADDRESSES[Math.floor(Math.random()*SIM_ADDRESSES.length)];
    await apiPost(nodeUrls[0],'/api/v1/mine?miner_address='+encodeURIComponent(minerAddr));
    autoBlockCount++;
    updateSimStatus();
    if(mode==='multi') {
      for(let n=1;n<nodeUrls.length;n++) await apiGet(nodeUrls[n],'/api/v1/nodes/resolve');
    }
    scheduleAutoBlock();
  }, 2500);
}

function toggleSimTx() {
  if(simTxRunning) { stopSimTx(); return; }
  simTxRunning = true; simTxCount = 0; simStartTime = Date.now();
  document.getElementById('btnSimTx').classList.add('active');
  document.getElementById('btnSimTxLabel').textContent = '停止交易';
  document.getElementById('simStatus').classList.remove('hidden');
  toast('📡 模拟交易已启动 — 5 个钱包相互交易','info');
  scheduleSimTx();
}

function stopSimTx() {
  simTxRunning = false; if(simTxTimer) clearTimeout(simTxTimer); simTxTimer = null;
  document.getElementById('btnSimTx').classList.remove('active');
  document.getElementById('btnSimTxLabel').textContent = '模拟交易';
  updateSimStatus();
}

function scheduleSimTx() {
  if(!simTxRunning) return;
  const delay = 80 + Math.random()*300;
  simTxTimer = setTimeout(async ()=>{
    if(!simTxRunning) return;
    const from = SIM_ADDRESSES[Math.floor(Math.random()*SIM_ADDRESSES.length)];
    let to = SIM_ADDRESSES[Math.floor(Math.random()*SIM_ADDRESSES.length)];
    while(to===from) to = SIM_ADDRESSES[Math.floor(Math.random()*SIM_ADDRESSES.length)];
    const amount = (Math.random()*9.9+0.1).toFixed(4);
    const txBody = {sender:from,receiver:to,amount:parseFloat(amount),timestamp:Date.now()/1000,tx_hash:''};
    if(mode==='multi') await Promise.allSettled(nodeUrls.map(u=>apiPost(u,'/api/v1/transactions',txBody)));
    else await apiPost(nodeUrls[0],'/api/v1/transactions',txBody);
    simTxCount++;
    updateSimStatus();
    scheduleSimTx();
  }, delay);
}

function updateSimStatus() {
  const el = document.getElementById('simStatus');
  let parts = [];
  if(autoBlockRunning) parts.push('⛏'+autoBlockCount+' 块');
  if(simTxRunning) parts.push('📡'+simTxCount+' TX');
  if(!autoBlockRunning && !simTxRunning) { el.classList.add('hidden'); return; }
  el.classList.remove('hidden');
  const secs = Math.round((Date.now()-simStartTime)/1000);
  el.textContent = parts.join(' | ') + ' | '+secs+'s';
}

// ============ MODALS ============
function showBlockDetail(block) {
  const maxIdx = (nodesData[0]?.chain?.length||1)-1;
  const confirms = block.index<=maxIdx ? maxIdx-block.index+1 : 0;
  document.getElementById('modalContent').innerHTML = `
    <div class="flex-between" style="margin-bottom:12px;">
      <div class="flex" style="gap:6px;align-items:center;">
        <button class="exp-btn exp-btn-outline" onclick="navigateBlock(${block.index-1})" ${block.index<=0?'disabled':''} style="padding:4px 8px;"><i class="fa-solid fa-chevron-left"></i></button>
        <h2 style="font-family:var(--font-title);font-size:15px;color:var(--accent);">Block #${block.index}</h2>
        <button class="exp-btn exp-btn-outline" onclick="navigateBlock(${block.index+1})" ${block.index>=maxIdx?'disabled':''} style="padding:4px 8px;"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
      <button class="exp-btn exp-btn-outline" onclick="closeModalDirect()" style="padding:4px 8px;"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="detail-row"><span class="detail-label">哈希</span><span class="detail-value">${block.hash}</span></div>
    <div class="detail-row"><span class="detail-label">前块哈希</span><span class="detail-value">${shortHash(block.previous_hash)}</span></div>
    <div class="detail-row"><span class="detail-label">时间戳</span><span class="detail-value">${new Date(block.timestamp*1000).toLocaleString()}</span></div>
    <div class="detail-row"><span class="detail-label">随机数</span><span class="detail-value">${block.nonce}</span></div>
    <div class="detail-row"><span class="detail-label">交易数</span><span class="detail-value">${block.transactions?.length||0} tx</span></div>
    <div class="detail-row"><span class="detail-label">确认数</span><span class="detail-value" style="color:var(--success);">${confirms}</span></div>
    ${block.transactions?.length?`<div style="margin-top:10px;"><h3 style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:6px;">Transactions</h3>${block.transactions.map(tx=>`<div class="detail-row" style="cursor:pointer;" onclick="showTxDetail(${esc(tx)})"><span class="detail-label" style="font-size:10px;">${tx.sender==='network'?'🏆 矿工奖励':tx.sender==='faucet'?'💧 水龙头':shortHash(tx.tx_hash||'')}</span><span class="detail-value" style="font-size:10px;color:${(tx.sender==='network'||tx.sender==='faucet')?'var(--success)':'var(--text-primary)'};">${fmt(tx.amount,4)} GLC</span></div>`).join('')}</div>`:''}
  `;
  document.getElementById('modalOverlay').style.display='flex';
}
async function navigateBlock(index) {
  if(index<0) return; let block = nodesData[0]?.chain?.find(b=>b.index===index);
  if(!block) { const res=await apiGet(nodeUrls[0],'/api/v1/blocks/'+index); if(res?.data) block=res.data; }
  if(block) showBlockDetail(block);
}
function showTxDetail(tx) {
  document.getElementById('modalContent').innerHTML = `
    <div class="flex-between" style="margin-bottom:12px;"><h2 style="font-family:var(--font-title);font-size:15px;color:var(--warning);">交易详情</h2><button class="exp-btn exp-btn-outline" onclick="closeModalDirect()" style="padding:4px 8px;"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="detail-row"><span class="detail-label">哈希</span><span class="detail-value">${tx.tx_hash||tx.hash||'--'}</span></div>
    <div class="detail-row"><span class="detail-label">发送方</span><span class="detail-value">${tx.sender}</span></div>
    <div class="detail-row"><span class="detail-label">接收方</span><span class="detail-value">${tx.receiver}</span></div>
    <div class="detail-row"><span class="detail-label">金额</span><span class="detail-value" style="color:var(--success);">${fmt(tx.amount,4)} GLC</span></div>
    <div class="detail-row"><span class="detail-label">时间</span><span class="detail-value">${tx.timestamp?new Date(tx.timestamp*1000).toLocaleString():'--'}</span></div>
  `;
  document.getElementById('modalOverlay').style.display='flex';
}
function closeModal(e) { if(e.target===document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').style.display='none'; }
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect();});

// ============ TOAST ============
function toast(msg, type) {
  const c = document.getElementById('toastContainer');
  while(c.children.length>=3) c.firstChild.remove();
  const colors = {success:'var(--success)',info:'var(--accent)',error:'var(--danger)'};
  const t = document.createElement('div'); t.className='exp-toast';
  t.style.borderLeft = '3px solid '+(colors[type]||colors.info); t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300);},3000);
}

// ============ INIT ============
setMode(mode);
setInterval(poll, 3000);
</script>
